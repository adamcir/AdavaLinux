set timeout=10
set default=0
terminal_input console
terminal_output console

menuentry "AdavaLinux v1.0" {
    echo 'Loading Linux ...'
    linux /boot/__KERNEL_IMAGE__ rdinit=/init console=tty0 quiet
    echo 'Loading inital ramdisk ...'
    initrd /boot/initramfs-installer.gz
}

menuentry "AdavaLinux v1.0 (debug)" {
    echo 'Loading Linux ...'
    linux /boot/__KERNEL_IMAGE__ rdinit=/init console=tty0
    echo 'Loading inital ramdisk ...'
    initrd /boot/initramfs-installer.gz
}

menuentry "AdavaLinux v1.0 (acpi off = ideal for old computers)" {
    echo 'Loading Linux ...'
    linux /boot/__KERNEL_IMAGE__ rdinit=/init console=tty0 acpi=off noapic nolapic irqpoll pci=nomsi quiet
    echo 'Loading inital ramdisk ...'
    initrd /boot/initramfs-installer.gz
}

menuentry "AdavaLinux v1.0 (acpi off + debug)" {
    echo 'Loading Linux ...'
    linux /boot/__KERNEL_IMAGE__ rdinit=/init console=tty0 acpi=off noapic nolapic irqpoll pci=nomsi
    echo 'Loading inital ramdisk ...'
    initrd /boot/initramfs-installer.gz
}
